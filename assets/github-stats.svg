<svg width="780" height="235" viewBox="0 0 780 235" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="exotickic GitHub statistics">
  <style>
    .card { fill: #ffffff; stroke: #d0d7de; }
